<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Student Notes">
</head>
<body>
<div class="app">
<header class="header">
<h1>Student Notes</h1>
<div class="tabs">
<button id="tab-today" class="tab active">Today</button>
<button id="tab-all" class="tab">All</button>
</div>
</header>
<main class="main">
<section class="form-section">
<div class="form-row">
        <label for="note-date">Note Date</label>
        <input id="note-date" type="date">
      </div>
      <div class="form-row">
        <label for="phone">Number</label>
        <div class="input-with-icon">
          <input id="phone" type="tel" placeholder="01XXXXXXXXX" inputmode="numeric" pattern="[0-9]{11}" list="phone-suggestions">
          <button id="paste-phone" type="button" class="icon-btn" title="Paste number">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <datalist id="phone-suggestions"></datalist>
      </div>
<div class="form-row">
<label for="note">Note</label>
<textarea id="note" rows="3" placeholder="Write a note"></textarea>
</div>
<div class="form-actions">
<button id="save" class="save">Save Note</button>
<div id="status" style="margin-top: 0.5rem; text-align: center; font-size: 0.85rem;"></div>
</div>
</section>
<section id="today-view" class="list-section"></section>
<section id="all-view" class="list-section hidden"></section>
</main>
</div>

<!-- Modal for full note -->
<div id="note-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Full Note</h3>
      <button id="close-modal" class="close-btn">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-footer" class="modal-footer">
      <span id="modal-date"></span>
      <span id="modal-phone"></span>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
<html>
